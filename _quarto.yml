    - name: "Valerie Hase"
    - affiliation: "University of Klagenfurt"
  reader-mode: false

  page-footer: 
      center: |
       University of Klagenfurt | Built with [Quarto](https://quarto.org/) |  [Imprint](imprint.qmd)  |  Shared under the [CC BY-NC license](https://creativecommons.org/licenses/by-nc/4.0/)   
