  chapters:
    - index.qmd
    - 1-install-r.qmd
  
    - part: 80-appendix.qmd
      chapters:
       - 81-materials.qmd
       - 82-coding-style.qmd
       - 83-glossary.qmd
       - 84-forum.qmd
       - 85-faq-r.qmd
